services:
  - type: web
    name: chat-pdf-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: APP_ENV
        value: production
      - key: ALLOWED_ORIGINS
        sync: false
      - key: MAX_FILE_SIZE_MB
        value: "10"
    healthCheckPath: /health
    autoDeploy: true
